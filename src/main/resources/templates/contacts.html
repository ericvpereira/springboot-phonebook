<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">

	<title>Phonebook</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

	<div class="container mt-5">

		<h1 class="mb-4">Phonebook Contacts</h1>

		<a th:href="@{/web/contacts/new}" class="btn btn-primary mb-3">
			New Contact
		</a>

		<table class="table table-bordered table-striped">

			<thead class="table-dark">

				<tr>
					<th>ID</th>
					<th>Name</th>
					<th>Phone</th>
					<th>Email</th>
					<th>Type</th>
					<th>City</th>
					<th>Actions</th>
				</tr>

			</thead>

			<tbody>

				<tr th:each="contact : ${contacts}">

					<td th:text="${contact.id}"></td>

					<td th:text="${contact.name}"></td>

					<td th:text="${contact.phone}"></td>

					<td th:text="${contact.email}"></td>

					<td th:text="${contact.type}"></td>

					<td th:text="${contact.address.city}"></td>

					<td>

						<a th:href="@{/web/contacts/edit/{id}(id=${contact.id})}" class="btn btn-warning btn-sm">
							Edit
						</a>

						<a th:href="@{/web/contacts/delete/{id}(id=${contact.id})}" class="btn btn-danger btn-sm"
							onclick="return confirmDelete()">
							Delete
						</a>

					</td>

				</tr>

			</tbody>

		</table>

	</div>

	<script th:src="@{/js/script.js}"></script>

</body>

</html>
