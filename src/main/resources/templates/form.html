<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Contact Form</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

	<div class="container mt-5">

		<h1 class="mb-4">Contact Form</h1>

		<form th:action="@{/web/contacts/save}" th:object="${contact}" method="post">

			<input type="hidden" th:field="*{id}">

			<!-- NAME -->

			<div class="mb-3">

				<label class="form-label">Name</label>

				<input type="text" class="form-control" th:field="*{name}">
			</div>

			<!-- PHONE -->

			<div class="mb-3">

				<label class="form-label">Phone</label>

				<input type="text" class="form-control" th:field="*{phone}">
			</div>

			<!-- EMAIL -->

			<div class="mb-3">

				<label class="form-label">Email</label>

				<input type="email" class="form-control" th:field="*{email}">
			</div>

			<!-- TYPE -->

			<div class="mb-3">

				<label class="form-label">Type</label>

				<select class="form-select" th:field="*{type}">

					<option value="FAMILY">Family</option>
					<option value="FRIEND">Friend</option>
					<option value="WORK">Work</option>
					<option value="OTHER">Other</option>

				</select>

			</div>

			<!-- STREET -->

			<div class="mb-3">

				<label class="form-label">Street</label>

				<input type="text" class="form-control" th:field="*{address.street}">
			</div>

			<!-- CITY -->

			<div class="mb-3">

				<label class="form-label">City</label>

				<input type="text" class="form-control" th:field="*{address.city}">
			</div>

			<!-- STATE -->

			<div class="mb-3">

				<label class="form-label">State</label>

				<input type="text" class="form-control" th:field="*{address.state}">
			</div>

			<!-- ZIP CODE -->

			<div class="mb-3">

				<label class="form-label">Zip Code</label>

				<input type="text" class="form-control" th:field="*{address.zipCode}">
			</div>

			<!-- BUTTONS -->

			<button type="submit" class="btn btn-success">
				Save
			</button>

			<a th:href="@{/web/contacts}" class="btn btn-secondary">
				Back
			</a>

		</form>

	</div>

</body>

</html>
